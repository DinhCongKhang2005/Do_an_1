actor_groups:
  BUSINESS_FACILITY:
    label_vi: "Doanh nghiệp / Cơ sở sản xuất, kinh doanh, dịch vụ"
    suggested_S_range: [2, 4]
    keywords: ["doanh nghiệp", "cơ sở sản xuất", "cơ sở kinh doanh", "cơ sở dịch vụ", "khu sản xuất", "khu công nghiệp", "cụm công nghiệp", "chủ nguồn thải", "đơn vị xử lý chất thải", "đơn vị thu gom", "đơn vị vận chuyển"]
  PROJECT_OWNER_INFRASTRUCTURE:
    label_vi: "Chủ dự án đầu tư / Chủ đầu tư hạ tầng"
    suggested_S_range: [2, 4]
    keywords: ["chủ dự án đầu tư", "chủ đầu tư", "nhà đầu tư", "dự án đầu tư", "ban quản lý dự án", "chủ đầu tư xây dựng và kinh doanh hạ tầng"]
  STATE_AGENCY:
    label_vi: "Cơ quan nhà nước"
    suggested_S_range: [3, 5]
    keywords: ["chính phủ", "thủ tướng", "bộ tài nguyên và môi trường", "bộ", "ủy ban nhân dân", "ubnd", "cơ quan quản lý nhà nước", "cơ quan cấp phép", "cơ quan thẩm định"]
  GENERAL_ORGANIZATION_INDIVIDUAL:
    label_vi: "Tổ chức, cá nhân chung"
    suggested_S_range: [3, 5]
    keywords: ["tổ chức, cá nhân", "cơ quan, tổ chức, cá nhân", "hộ gia đình, cá nhân", "cá nhân"]
  COMMUNITY_CRAFT_VILLAGE:
    label_vi: "Cộng đồng dân cư / Làng nghề"
    suggested_S_range: [2, 3]
    keywords: ["cộng đồng dân cư", "khu dân cư", "làng nghề", "hộ sản xuất trong làng nghề"]

actor_priority:
  - STATE_AGENCY
  - PROJECT_OWNER_INFRASTRUCTURE
  - BUSINESS_FACILITY
  - COMMUNITY_CRAFT_VILLAGE
  - GENERAL_ORGANIZATION_INDIVIDUAL

